<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>云子五子棋 - 人机对弈</title>
  <link rel="stylesheet" href="/css/mobile.css">

</head>
<body class="game-page">
  <nav class="game-nav">
    <div class="nav-brand">
      <button class="back-btn" id="backBtn" title="返回大厅">◀</button>
      <div class="mini-stone"></div>
      <span class="brand-text">云子五子棋</span>
    </div>
    <div class="nav-center">
      <div class="room-info" id="roomDisplay">
        <span class="room-label">模式:</span>
        <span class="room-id" id="difficultyText">人机对弈</span>
      </div>
      <span class="move-info">第 <span id="moveCount">0</span> 手</span>
    </div>
    <div class="nav-user">
      <div class="user-info" id="userInfo">
        <span class="user-rating">★ <span id="userRating">1000</span></span>
        <span class="user-name" id="userName">--</span>
        <div class="user-avatar" id="userAvatar"></div>
      </div>
      <button class="logout-btn" id="logoutBtn">退出</button>
    </div>
  </nav>

  <div class="game-status-bar"><span class="game-status" id="statusText">准备对局</span></div>

  <main class="game-layout ai-game-layout">
    <!-- 棋盘区 -->
    <section class="board-section">
      <div class="player-row">
        <div class="player-card" id="blackPlayer">
          <div class="turn-dot" id="blackTurn"></div>
          <div class="player-stone black"></div>
          <div class="player-meta">
            <span class="player-name" id="blackName">--</span>
            <span class="player-timer" id="blackTimer">--:--</span>
          </div>
          <span class="player-side">黑方</span>
        </div>
        <div class="player-card right" id="whitePlayer">
          <div class="turn-dot" id="whiteTurn"></div>
          <div class="player-stone white"></div>
          <div class="player-meta">
            <span class="player-name" id="whiteName">AI</span>
            <span class="player-timer" id="whiteTimer">--:--</span>
          </div>
          <span class="player-side">白方</span>
        </div>
      </div>

      <!-- 棋盘 -->
      <div class="board-wrapper">
          <canvas id="gameBoard" width="600" height="600"></canvas>
          <div class="last-move-marker" id="lastMoveMarker"></div>
      </div>

      <!-- 控制栏 -->
      <div class="control-bar">
        <button class="ctrl-btn danger" id="resignBtn" title="认输">
          <span class="ctrl-icon">⚔</span>
          <span>认输</span>
        </button>
        <button class="ctrl-btn" id="leaveBtn" title="离开">
          <span class="ctrl-icon">✕</span>
          <span>离开</span>
        </button>
      </div>

      <!-- AI 思考状态 -->
      <div class="ai-thinking-box ai-waiting" id="aiThinkingBox">
        <span class="ai-wait-icon">⏳</span>
        <span>AI 等待中...</span>
      </div>

      <!-- AI 信息面板 -->
      <aside class="ai-info-section">
        <div class="ai-panel-header">
          <span class="ai-panel-icon">🤖</span>
          <div>
            <div class="ai-panel-title">人机对弈</div>
            <div class="ai-panel-subtitle" id="aiDifficultyLabel">初级</div>
          </div>
        </div>
        <div class="ai-tips-box">
          <div class="ai-tips-title">🎯 本局提示</div>
          <ul class="ai-tips-list" id="aiTipsList">
            <li>黑方先行，落子后等待AI回应</li>
            <li>五子连珠即获胜</li>
            <li>注意防守，不让AI连成五子</li>
          </ul>
        </div>
        <div class="ai-score-panel">
          <div class="ai-score-title">积分规则</div>
          <div class="ai-score-rows" id="aiScoreRules"></div>
        </div>
      </aside>
    </section>
  </main>

  <!-- 游戏结束 -->
  <div class="modal" id="gameEndModal">
    <div class="modal-content result-content">
      <div class="result-icon" id="resultIcon"></div>
      <h2 id="resultTitle">对局结束</h2>
      <p id="resultReason"></p>
      <div class="result-rating-change" id="ratingChange"></div>
      <div class="result-actions">
        <button class="primary-btn" id="playAgainBtn">再来一局</button>
        <button class="secondary-btn" id="backToLobbyBtn">返回大厅</button>
      </div>
    </div>
  </div>

  <!-- 确认框 -->
  <div class="modal" id="confirmModal">
    <div class="modal-content">
      <h3 id="confirmTitle">确认</h3>
      <p id="confirmMessage">确定要进行此操作吗？</p>
      <div class="confirm-actions">
        <button class="secondary-btn" id="confirmCancel">取消</button>
        <button class="primary-btn" id="confirmOk">确定</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/game.js"></script>
  <script src="/js/ai-game.js"></script>
</body>
</html>
